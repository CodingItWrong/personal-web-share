name: Deploy to Live

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge-to-live:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: git fetch origin

      - name: Merge current branch into live
        run: |
          SOURCE_BRANCH="${GITHUB_REF_NAME}"

          echo "Merging ${SOURCE_BRANCH} into live"

          # Switch to live branch
          git checkout live
          git pull origin live

          # Merge source branch into live
          git merge --no-ff "origin/${SOURCE_BRANCH}" -m "Merge ${SOURCE_BRANCH} into live"

      - name: Push live branch
        run: |
          git push origin live